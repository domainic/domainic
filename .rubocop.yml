require:
  - rubocop-on-rbs
  - rubocop-performance
  - rubocop-rspec
  - rubocop-yard

AllCops:
  Exclude:
    - bin/**/*
    - vendor/**/*
  NewCops: enable
  TargetRubyVersion: 3.1

Naming/FileName:
  Exclude:
    - '**/domainic-*'

RBS:
  Enabled: true

RSpec/NestedGroups:
  AllowedGroups:
    - describe

Style/Documentation:
  Exclude:
    - '**/*.rbs'
