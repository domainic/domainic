# Download sources
sources:
  - type: git
    name: ruby/gem_rbs_collection
    remote: https://github.com/ruby/gem_rbs_collection.git
    revision: main
    repo_dir: gems

path: .gem_rbs_collection

gems:
  - name: activesupport
    ignore: true
  - name: concurrent-ruby
    ignore: true
  - name: connection_pool
    ignore: true
  - name: diff-lcs
    ignore: true
  - name: i18n
    ignore: true
  - name: listen
    ignore: true
  - name: parallel
    ignore: true
  - name: rainbow
    ignore: true
  - name: regexp_parser
    ignore: true
  - name: simplecov
    ignore: true
  - name: tzinfo
    ignore: true
